---
- name: Deploy 2K Cargo API to VPS
  hosts: cargo_api
  become: true

  pre_tasks:
    - name: Validate required deployment variables
      ansible.builtin.assert:
        that:
          - app_repo_url is defined
          - app_repo_url | length > 0
          - app_domain is defined
          - app_domain | length > 0
          - app_master_key is defined
          - app_master_key | length == 32
          - database_synchronize | bool == false
        fail_msg: "Set app_repo_url, app_domain, a 32-byte app_master_key, and keep database_synchronize=false for production."

    - name: Calculate Docker apt architecture
      ansible.builtin.set_fact:
        docker_apt_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
          else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
          else ansible_architecture }}

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - sqlite3
          - ufw
        state: present
        update_cache: true

    - name: Create apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker apt key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Allow deploy user to run Docker after next login
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      when: ansible_user is defined and ansible_user != 'root'

    - name: Allow SSH through firewall
      ansible.builtin.command: "ufw allow {{ ssh_port }}/tcp"
      changed_when: false
      when: configure_firewall | bool

    - name: Allow HTTP through firewall
      ansible.builtin.command: ufw allow 80/tcp
      changed_when: false
      when: configure_firewall | bool

    - name: Allow HTTPS through firewall
      ansible.builtin.command: ufw allow 443/tcp
      changed_when: false
      when: configure_firewall | bool

    - name: Set firewall default incoming policy
      ansible.builtin.command: ufw default deny incoming
      changed_when: false
      when: configure_firewall | bool

    - name: Set firewall default outgoing policy
      ansible.builtin.command: ufw default allow outgoing
      changed_when: false
      when: configure_firewall | bool

    - name: Enable firewall
      ansible.builtin.command: ufw --force enable
      changed_when: false
      when: configure_firewall | bool

    - name: Create application directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ app_root }}", owner: root, group: root, mode: "0755" }
        - { path: "{{ app_data_dir }}", owner: "1000", group: "1000", mode: "0750" }
        - { path: "{{ app_backup_dir }}", owner: root, group: root, mode: "0700" }

    - name: Checkout application source
      ansible.builtin.git:
        repo: "{{ app_repo_url }}"
        dest: "{{ app_release_dir }}"
        version: "{{ app_git_version }}"
        update: true
        force: true
        accept_hostkey: true

    - name: Render application environment
      ansible.builtin.template:
        src: ../templates/env.j2
        dest: "{{ app_root }}/.env"
        owner: root
        group: root
        mode: "0600"

    - name: Render Docker Compose file
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ app_root }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Render Caddyfile
      ansible.builtin.template:
        src: ../templates/Caddyfile.j2
        dest: "{{ app_root }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"

    - name: Install SQLite backup script
      ansible.builtin.template:
        src: ../templates/backup-sqlite.sh.j2
        dest: /usr/local/bin/2k-cargo-api-backup
        owner: root
        group: root
        mode: "0700"
      when: enable_backups | bool

    - name: Schedule SQLite backups
      ansible.builtin.cron:
        name: 2k-cargo-api sqlite backup
        user: root
        minute: "{{ backup_cron_minute }}"
        hour: "{{ backup_cron_hour }}"
        job: /usr/local/bin/2k-cargo-api-backup
      when: enable_backups | bool

    - name: Build application image
      ansible.builtin.command: docker compose build app
      args:
        chdir: "{{ app_root }}"
      changed_when: true

    - name: Start application stack
      ansible.builtin.command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ app_root }}"
      changed_when: true

    - name: Wait for application to answer inside container
      ansible.builtin.command: >
        docker compose exec -T app node -e
        "fetch('http://127.0.0.1:{{ app_port }}/api/docs-json').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      args:
        chdir: "{{ app_root }}"
      changed_when: false
      retries: 12
      delay: 5
      register: app_probe
      until: app_probe.rc == 0

    - name: Show stack status
      ansible.builtin.command: docker compose ps
      args:
        chdir: "{{ app_root }}"
      changed_when: false
      register: compose_ps

    - name: Print stack status
      ansible.builtin.debug:
        var: compose_ps.stdout_lines
