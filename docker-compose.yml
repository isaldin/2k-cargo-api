services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    environment:
      - APP_PORT=${APP_PORT:-3000}
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - SITE_BASE_URL=${SITE_BASE_URL:-https://2k-cargo-krg.kz}
      - DATABASE_PATH=${DATABASE_PATH:-./data/sessions.sqlite}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
      - PACKAGE_SCAN_PAGE_LIMIT=${PACKAGE_SCAN_PAGE_LIMIT:-10}
      - AUTO_RELOGIN_RETRY_LIMIT=${AUTO_RELOGIN_RETRY_LIMIT:-1}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
